#region message
enable: true
#endregion message
#region afk
afk:
  enable: true
  range: "SERVER"
  delay: 3000
  radius: 1.0
  ignore:
  - "afk"
  destination:
    type: "CHAT"
  ticker:
    enable: true
    period: 20
  sound:
    enable: false
#endregion afk
#region anvil
anvil:
  enable: false
#endregion anvil
#region auto
auto:
  enable: false
  types:
    announcement:
      random: true
      destination:
        type: "CHAT"
      ticker:
        enable: true
        period: 9000
      sound:
        enable: false
#endregion auto
#region book
book:
  enable: false
#endregion book
#region bossbar
bossbar:
  enable: false
  announce: {}
#endregion bossbar
#region brand
brand:
  enable: false
  random: true
  destination:
    type: "BRAND"
  ticker:
    enable: true
    period: 100
#endregion brand
#region bubble
bubble:
  enable: true
  visible_to_self: true
  max_count: 3
  max_length: 30
  elevation: 2.1
  distance: 30.0
  read_speed: 90.0
  handicap_chars: 10.0
  hint_buffer_length: 7
  word_break_hint: "‑"
  interaction:
    enable: true
    height: 0.4
  modern:
    enable: true
    has_shadow: false
    see_through: true
    animation_time: 5
    scale: 1.0
    background: "#00000040"
    billboard: "CENTER"
  ticker:
    enable: true
    period: 5
#endregion bubble
#region chat
chat:
  enable: true
  mode: "BUKKIT"
  priority: "NORMAL"
  types:
    local:
      enable: true
      cancel: true
      range: 100
      priority: 0
      trigger: ""
      null_receiver:
        enable: true
        destination:
          type: "ACTION_BAR"
          times:
            stay: 20
      destination:
        type: "CHAT"
      cooldown:
        enable: false
      sound:
        enable: false
    global:
      enable: true
      cancel: false
      range: "PROXY"
      priority: 5
      trigger: "!"
      null_receiver:
        enable: true
        destination:
          type: "ACTION_BAR"
          times:
            stay: 20
      destination:
        type: "CHAT"
      cooldown:
        enable: false
      sound:
        enable: false
#endregion chat
#region format
format:
  enable: true
  convert_legacy_color: true
  adventure_tags:
  - "HOVER"
  - "CLICK"
  - "COLOR"
  - "KEYBIND"
  - "TRANSLATABLE"
  - "TRANSLATABLE_FALLBACK"
  - "INSERTION"
  - "FONT"
  - "DECORATION"
  - "GRADIENT"
  - "RAINBOW"
  - "RESET"
  - "NEWLINE"
  - "TRANSITION"
  - "SELECTOR"
  - "SCORE"
  - "NBT"
  - "PRIDE"
  - "SHADOW_COLOR"
#endregion format
#region animation
  animation:
    enable: true
    values:
      flectonepulse:
        interval: 5
#endregion animation
#region condition
  condition:
    enable: true
    values:
      player_name:
        value: "%player_name%"
        type: "STRING"
      player_ping:
        value: "%player_ping%"
        type: "NUMBER"
      is_admin:
        value: "minecraft.admin"
        type: "PERMISSION"
#endregion condition
#region fcolor
  fcolor:
    enable: true
    default_colors:
      1: "<gradient:#A6D8FF:#8CC8FF>"
      2: "<gradient:#6BB6FF:#4DA6FF>"
      3: "#A9A9A9"
      4: "#FFFAFA"
#endregion fcolor
#region fixation
  fixation:
    enable: false
    end_dot: false
    first_letter_uppercase: false
    non_dot_symbols:
    - ";"
    - ":"
    - "'"
    - "\""
    - ","
    - "?"
    - "!"
    - "."
#endregion fixation
#region mention
  mention:
    enable: true
    trigger: "@"
    everyone_tag: "here"
    destination:
      type: "TOAST"
      icon: "minecraft:bell"
      subtext: ""
      style: "TASK"
    sound:
      enable: true
      volume: 0.9
      pitch: 1.5
      category: "UI"
      name: "SFX_Drop_Items_Potion"
#endregion mention
#region moderation
  moderation:
    enable: true
#endregion moderation
#region caps
    caps:
      enable: false
      trigger: 0.7
#endregion caps
#region delete
    delete:
      enable: false
      history_length: 100
#endregion delete
#region newbie
    newbie:
      enable: false
      mode: "PLAYED_TIME"
      timeout: 3600
#endregion newbie
#region flood
    flood:
      enable: false
      trim_to_single: false
      max_repeated_symbols: 10
      max_repeated_words: 2
#endregion flood
