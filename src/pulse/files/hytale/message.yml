#region names
  names:
    enable: true
    should_check_invisibility: false
#endregion names
#region object
  object:
    enable: false
    player_head_tag:
      enable: true
      need_extra_space: true
      hide_invisible_player_head: false
    sprite_tag:
      enable: true
      need_extra_space: true
    texture_tag:
      enable: true
      need_extra_space: false
      mineskin_api_key: ""
      values:
        example: ""
#endregion object
#region questionanswer
  question_answer:
    enable: false
    questions:
      server:
        range: "PLAYER"
        destination:
          type: "CHAT"
        cooldown:
          enable: false
        sound:
          enable: false
        target: "(?i)\\b(what\\s+is\\s+this\\s+server|what\\'?s\\s+this\\s+server|what\\s+server\\s+is\\s+this)\\b"
      flectone:
        range: "PLAYER"
        destination:
          type: "CHAT"
        cooldown:
          enable: false
        sound:
          enable: false
        target: "(?i)\\b(flectone|flectonepulse|flecton)\\b"
#endregion questionanswer
#region replacement
  replacement:
    enable: true
    triggers:
      ping: "(?<!\\\\)(?<!\\S)%ping%(?!\\S)"
      tps: "(?<!\\\\)(?<!\\S)%tps%(?!\\S)"
      online: "(?<!\\\\)(?<!\\S)%online%(?!\\S)"
      coords: "(?<!\\\\)(?<!\\S)%coords%(?!\\S)"
      stats: "(?<!\\\\)(?<!\\S)%stats%(?!\\S)"
      skin: "(?<!\\\\)(?<!\\S)%skin%(?!\\S)"
      item: "(?<!\\\\)(?<!\\S)%item%(?!\\S)"
      image: "(?<!\\\\{2,})(?<=\\s|^)((?i:https?)://(?:[a-zA-Z0-9-@]{1,63}\\.)*(?i:imgur\\.com|discordapp\\.net|cdn\\.discordapp\\.com)/[\\w\\-./?=&%!#$'()*+,;:=~@]*\\.(?:jpg|jpeg|png|gif|webp|bmp))(?!\\S)"
      url: "(?<!\\\\{2,})(?<=\\s|^)((?i:https?|ftp)://(?:[\\p{L}a-zA-Z0-9-@]{1,63}\\.)+[\\p{L}a-zA-Z]{2,6}(?::\\d{1,5})?(?:/[\\w\\-./?=&%!#$'()*+,;:=~@]*)?)(?!\\S)"
      spoiler: "(?<!\\S)\\|\\|([^\\|\\|\\n]+)\\|\\|(?!\\S)"
      bold: "(?<!\\S)\\*\\*([^\\*\\*\\n]+)\\*\\*(?!\\S)"
      italic: "(?<!\\S)\\*([^\\*\\n]+)\\*(?!\\S)"
      underline: "(?<!\\S)__([^__\\n]+)__(?!\\S)"
      obfuscated: "(?<!\\S)\\?\\?([^\\?\\?\\n]+)\\?\\?(?!\\S)"
      strikethrough: "(?<!\\S)~~([^~~\\n]+)~~(?!\\S)"
#endregion replacement
