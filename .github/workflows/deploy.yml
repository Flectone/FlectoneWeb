name: Deploy Flectone Web

on:
  release:
    types: [ published ]
  push:
    branches:
      - master

jobs:
  build-and-deploy:
    if: github.event_name == 'release' || contains(github.event.head_commit.message, '[deploy]')
    runs-on: ubuntu-latest

    steps:
      - name: Deploy to server
        uses: easingthemes/ssh-deploy@2cc5b27bf3029d0455dd5e09fe02633904031447 # main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: "./"
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT }}
          TARGET: "${{ secrets.REMOTE_TARGET }}"
          EXCLUDE: "node_modules, .next"
          SCRIPT_AFTER: |
            cd ${{ secrets.REMOTE_TARGET }}
            npm ci
            npm run build
            mkdir -p .next/standalone/.next
            cp -r public .next/standalone/public || true
            cp -r .next/static .next/standalone/.next/static || true
            cp .next/BUILD_ID .next/standalone/.next/ 2>/dev/null || true
            pm2 reload flectone-web --update-env || pm2 start server.js --name flectone-web