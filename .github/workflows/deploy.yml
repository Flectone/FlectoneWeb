name: Deploy Flectone Web

on:
  release:
    types: [ published ]

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7

      - name: Set up Node.js
        uses: actions/setup-node@820762786026740c76f36085b0efc47a31fe5020 # v7
        with:
          node-version: '24'

      - name: Install dependencies
        run: npm ci

      - name: Build project
        run: npm run build

      - name: Prepare standalone
        run: |
          mkdir -p .next/standalone/.next
          cp -r public .next/standalone/public || true
          cp -r .next/static .next/standalone/.next/static || true
          cp .next/BUILD_ID .next/standalone/.next/ 2>/dev/null || true
          rm -rf .next/standalone/node_modules/sharp

      - name: Deploy to server
        uses: easingthemes/ssh-deploy@2cc5b27bf3029d0455dd5e09fe02633904031447 # main
        with:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
          ARGS: "-rlgoDzvc -i --delete"
          SOURCE: ".next/standalone/"
          REMOTE_HOST: ${{ secrets.REMOTE_HOST }}
          REMOTE_USER: ${{ secrets.REMOTE_USER }}
          REMOTE_PORT: ${{ secrets.REMOTE_PORT }}
          TARGET: "${{ secrets.REMOTE_TARGET }}"
          SCRIPT_AFTER: |
            cd ${{ secrets.REMOTE_TARGET }}
            npm install --include=optional sharp
            pm2 reload flectone-web --update-env || pm2 start server.js --name flectone-web